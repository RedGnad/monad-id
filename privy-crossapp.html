<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGTANKS - Monad Games ID Login</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .monad-button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
            min-width: 200px;
        }
        .monad-button:hover {
            transform: translateY(-2px);
        }
        .monad-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
        }
        .wallet-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="container">
            <div class="logo">🎮 CHOGTANKS</div>
            <div class="subtitle">Connect with Monad Games ID</div>
            
            <button id="monad-login-btn" class="monad-button">
                🎯 Sign in with Monad Games ID
            </button>
            
            <button id="discord-login-btn" class="monad-button" style="background: #5865F2;">
                🎮 Discord Login
            </button>
            
            <div id="status" class="status loading">Ready to connect...</div>
            <div id="wallet-info" class="wallet-info" style="display: none;"></div>
        </div>
    </div>

    <script>
        console.log('[CHOGTANKS] 🚀 Starting API-based authentication...');
        
        const PRIVY_APP_ID = 'cmek64iqd02lql70b9fl64lm9';
        const MONAD_GAMES_ID = 'cmd8euall0037le0my79qpz42';
        const PRIVY_API_BASE = 'https://auth.privy.io';
        
        let currentUser = null;
        let authToken = null;
        
        // Elements
        const monadBtn = document.getElementById('monad-login-btn');
        const discordBtn = document.getElementById('discord-login-btn');
        const statusEl = document.getElementById('status');
        const walletInfoEl = document.getElementById('wallet-info');
        
        function updateStatus(message, type = 'loading') {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            console.log(`[STATUS] ${message}`);
        }
        
        function sendToUnity(data) {
            console.log('[UNITY] Sending data:', data);
            
            try {
                // PostMessage to parent
                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'CHOGTANKS_MONAD_RESULT',
                        data: data
                    }, '*');
                }
                
                // Unity WebGL
                if (window.unityInstance) {
                    window.unityInstance.SendMessage('MonadGamesIDWebView', 'OnMonadGamesIDResult', JSON.stringify(data));
                }
                
                // URL callback
                const callbackUrl = `chogtanks://monad-result?${new URLSearchParams(data).toString()}`;
                setTimeout(() => window.location.href = callbackUrl, 1000);
                
            } catch (error) {
                console.error('[UNITY] Error:', error);
            }
        }
        
        // Discord OAuth Login
        async function loginWithDiscord() {
            updateStatus('Redirecting to Discord...', 'loading');
            
            const discordAuthUrl = `https://discord.com/api/oauth2/authorize?` +
                `client_id=1234567890&` + // Remplace par ton Discord Client ID
                `redirect_uri=${encodeURIComponent(window.location.href)}&` +
                `response_type=code&` +
                `scope=identify%20email`;
            
            window.location.href = discordAuthUrl;
        }
        
        // Cross App avec Monad Games ID
        async function loginWithMonadGamesID() {
            updateStatus('Connecting to Monad Games ID...', 'loading');
            
            try {
                // Étape 1: Redirection vers Monad Games ID
                const monadAuthUrl = `https://monad-games-id-site.vercel.app/auth/privy?` +
                    `app_id=${PRIVY_APP_ID}&` +
                    `redirect_uri=${encodeURIComponent(window.location.href)}`;
                
                console.log('[MONAD] Redirecting to:', monadAuthUrl);
                window.location.href = monadAuthUrl;
                
            } catch (error) {
                console.error('[MONAD] Error:', error);
                updateStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        // Traiter retour d'authentification
        function handleAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const token = urlParams.get('token');
            const wallet = urlParams.get('wallet');
            const username = urlParams.get('username');
            
            if (code) {
                updateStatus('Processing Discord authentication...', 'loading');
                // Traiter code Discord
                processDiscordAuth(code);
            } else if (token && wallet) {
                updateStatus('Processing Monad Games ID authentication...', 'loading');
                // Traiter retour Monad Games ID
                processMonadAuth(token, wallet, username);
            }
        }
        
        async function processDiscordAuth(code) {
            try {
                // Échanger code contre token Discord
                const response = await fetch('/api/discord-auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    updateStatus('✅ Discord authentication successful!', 'success');
                    sendToUnity({
                        success: true,
                        provider: 'discord',
                        username: data.username,
                        email: data.email
                    });
                } else {
                    throw new Error(data.error);
                }
                
            } catch (error) {
                updateStatus(`Discord auth error: ${error.message}`, 'error');
            }
        }
        
        async function processMonadAuth(token, wallet, username) {
            try {
                updateStatus('✅ Monad Games ID connected!', 'success');
                
                // Afficher infos wallet
                walletInfoEl.innerHTML = `
                    <strong>Monad Games ID:</strong><br/>
                    Username: ${username || 'Unknown'}<br/>
                    Wallet: ${wallet.slice(0, 6)}...${wallet.slice(-4)}
                `;
                walletInfoEl.style.display = 'block';
                
                // Envoyer à Unity
                sendToUnity({
                    success: true,
                    provider: 'monad_games_id',
                    walletAddress: wallet,
                    username: username,
                    token: token
                });
                
            } catch (error) {
                updateStatus(`Monad auth error: ${error.message}`, 'error');
            }
        }
        
        // Event listeners
        monadBtn.addEventListener('click', loginWithMonadGamesID);
        discordBtn.addEventListener('click', loginWithDiscord);
        
        // Check for auth callback on load
        window.addEventListener('load', handleAuthCallback);
        
        updateStatus('Ready to connect...', 'loading');
        console.log('[CHOGTANKS] ✅ API-based auth ready');
    </script>
</body>
</html>
