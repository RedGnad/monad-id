<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGTANKS - Monad Games ID Login</title>
    
    
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .monad-button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
            min-width: 200px;
        }
        .monad-button:hover {
            transform: translateY(-2px);
        }
        .monad-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
        }
        .wallet-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮 CHOGTANKS</div>
        <div class="subtitle">Connect with Monad Games ID</div>
        
        <button id="monad-login-btn" class="monad-button">
            🎯 Sign in with Monad Games ID
        </button>
        
        <div id="status" class="status loading">Ready to connect...</div>
        <div id="wallet-info" class="wallet-info" style="display: none;"></div>
    </div>

    <script>
        console.log('[CHOGTANKS] 🚀 Starting simple auth...');
        
        const PRIVY_APP_ID = 'cmek64iqd02lql70b9fl64lm9';
        const MONAD_GAMES_ID = 'cmd8euall0037le0my79qpz42';
        
        const statusEl = document.getElementById('status');
        const walletInfoEl = document.getElementById('wallet-info');
        const monadBtn = document.getElementById('monad-login-btn');
        
        function updateStatus(message, type = 'loading') {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            console.log(`[STATUS] ${message}`);
        }
        
        function sendToUnity(data) {
            console.log('[UNITY] Sending data:', data);
            try {
                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'CHOGTANKS_MONAD_RESULT',
                        data: data
                    }, '*');
                }
                
                if (window.unityInstance) {
                    window.unityInstance.SendMessage('PrivyManager', 'OnMonadGamesIDResult', JSON.stringify(data));
                }
            } catch (error) {
                console.error('[UNITY] Error sending to Unity:', error);
            }
        }
        
        async function loginWithMonadGamesID() {
            updateStatus('Connecting to Monad Games ID...', 'loading');
            
            try {
                // Rediriger directement vers Monad Games ID
                const monadGamesIdUrl = `https://monad-games-id-site.vercel.app/auth?` +
                    `redirect_uri=${encodeURIComponent(window.location.href)}`;
                
                console.log('[MONAD] Redirecting directly to Monad Games ID:', monadGamesIdUrl);
                window.location.href = monadGamesIdUrl;
                
            } catch (error) {
                console.error('[MONAD] Error:', error);
                updateStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        function handleAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const token = urlParams.get('token');
            const wallet = urlParams.get('wallet');
            const username = urlParams.get('username');
            
            if (code) {
                updateStatus('Processing authentication...', 'loading');
                processAuthCode(code);
            } else if (token && wallet) {
                updateStatus('Processing Monad Games ID authentication...', 'loading');
                processMonadAuth(token, wallet, username);
            }
        }
        
        async function processAuthCode(code) {
            try {
                updateStatus('✅ Authentication successful!', 'success');
                
                // Simuler récupération des données utilisateur
                walletInfoEl.innerHTML = `
                    <strong>Monad Games ID:</strong><br/>
                    Code: ${code.slice(0, 8)}...<br/>
                    Status: Connected
                `;
                walletInfoEl.style.display = 'block';
                
                sendToUnity({
                    success: true,
                    provider: 'monad_games_id',
                    code: code
                });
            } catch (error) {
                console.error('[AUTH] Error processing code:', error);
                updateStatus(`Auth error: ${error.message}`, 'error');
                sendToUnity({
                    success: false,
                    error: error.message
                });
            }
        }
        
        async function processMonadAuth(token, wallet, username) {
            try {
                updateStatus('✅ Monad Games ID connected!', 'success');
                
                // Afficher infos wallet
                walletInfoEl.innerHTML = `
                    <strong>Monad Games ID:</strong><br/>
                    Username: ${username || 'Unknown'}<br/>
                    Wallet: ${wallet.slice(0, 6)}...${wallet.slice(-4)}
                `;
                walletInfoEl.style.display = 'block';
                
                // Envoyer à Unity
                sendToUnity({
                    success: true,
                    provider: 'monad_games_id',
                    token: token,
                    wallet: wallet,
                    username: username
                });
                
            } catch (error) {
                updateStatus(`Monad auth error: ${error.message}`, 'error');
                sendToUnity({
                    success: false,
                    error: error.message
                });
            }
        }
        
        // Event listeners
        monadBtn.addEventListener('click', loginWithMonadGamesID);
        
        // Initialiser au chargement
        window.addEventListener('load', function() {
            console.log('[CHOGTANKS] Page loaded, checking for auth callback...');
            handleAuthCallback();
        });
        
        console.log('[CHOGTANKS] ✅ Simple auth ready');
    </script>
</body>
</html>
