<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGTANKS - Monad Games ID Login</title>
    
    
    
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .monad-button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
            min-width: 200px;
        }
        .monad-button:hover {
            transform: translateY(-2px);
        }
        .monad-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
        }
        .wallet-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮 CHOGTANKS</div>
        <div class="subtitle">Connect with Monad Games ID</div>
        
        <button id="monad-login-btn" class="monad-button">
            🎯 Sign in with Monad Games ID
        </button>
        
        <div id="status" class="status loading">Ready to connect...</div>
        <div id="wallet-info" class="wallet-info" style="display: none;"></div>
    </div>

    <script>
        console.log('[CHOGTANKS] 🚀 Starting simple Monad Games ID auth...');
        
        const statusEl = document.getElementById('status');
        const walletInfoEl = document.getElementById('wallet-info');
        const monadBtn = document.getElementById('monad-login-btn');
        
        function updateStatus(message, type = 'loading') {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            console.log(`[STATUS] ${message}`);
        }
        
        function sendToUnity(data) {
            console.log('[UNITY] 📤 Sending data to Unity:', data);
            try {
                // 1. PostMessage vers parent window
                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'CHOGTANKS_MONAD_RESULT',
                        data: data
                    }, '*');
                    console.log('[UNITY] ✅ PostMessage sent to parent');
                }
                
                // 2. Unity WebGL SendMessage - essayer plusieurs noms de GameObject
                const gameObjectNames = ['ChogTanksPrivyManager', 'PrivyManager', 'MonadGamesIDManager'];
                
                if (window.unityInstance) {
                    gameObjectNames.forEach(objName => {
                        try {
                            window.unityInstance.SendMessage(objName, 'OnMonadGamesIDResult', JSON.stringify(data));
                            console.log(`[UNITY] ✅ SendMessage sent to ${objName}`);
                        } catch (e) {
                            console.log(`[UNITY] ⚠️ Failed to send to ${objName}:`, e.message);
                        }
                    });
                } else {
                    console.log('[UNITY] ⚠️ unityInstance not found');
                }
                
                // 3. Global callback si défini
                if (window.onMonadGamesIDResult) {
                    window.onMonadGamesIDResult(data);
                    console.log('[UNITY] ✅ Global callback called');
                }
                
            } catch (error) {
                console.error('[UNITY] ❌ Error sending to Unity:', error);
            }
        }
        
        async function loginWithMonadGamesID() {
            console.log('[CHOGTANKS] 🎮 Redirecting to Monad Games ID...');
            updateStatus('Redirection vers Monad Games ID...', 'loading');
            
            // URL de redirection Cross App Monad Games ID - REDIRECT VERS WEBVIEW
            const crossAppUrl = 'https://auth.privy.io/cross-app/authorize?' + 
                'client_id=cmek64iqd02lql70b9fl64lm9' +
                '&provider_app_id=cmd8euall0037le0my79qpz42' +
                '&redirect_uri=' + encodeURIComponent('https://redgnad.github.io/CHOGTANKS/privy-crossapp.html') +
                '&response_type=code' +
                '&scope=openid';
            
            console.log('[CHOGTANKS] 🌐 Cross App URL:', crossAppUrl);
            console.log('[CHOGTANKS] 🎯 Redirect URI: https://redgnad.github.io/CHOGTANKS/privy-crossapp.html');
            window.location.href = crossAppUrl;
        }
        
        function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const wallet = urlParams.get('wallet');
            const username = urlParams.get('username');
            const code = urlParams.get('code');
            
            console.log('[CALLBACK] 🔍 Checking URL parameters:', {
                currentUrl: window.location.href,
                token: token,
                wallet: wallet,
                username: username,
                code: code,
                allParams: Object.fromEntries(urlParams)
            });
            
            // DIAGNOSTIC CRITIQUE: Vérifier si on arrive jamais ici
            console.log('[DIAGNOSTIC] 🚨 CALLBACK FUNCTION CALLED - This proves we reached privy-crossapp.html');
            updateStatus('🔍 Callback function called - analyzing...', 'loading');
            
            // Vérifier si on revient de Monad Games ID (même sans paramètres)
            const referrer = document.referrer;
            const isFromMonad = referrer.includes('monad-games-id-site.vercel.app');
            
            console.log('[CALLBACK] 📍 Referrer check:', {
                referrer: referrer,
                isFromMonad: isFromMonad
            });
            
            if (token && wallet) {
                console.log('[CALLBACK] ✅ Token and wallet found in URL!');
                updateStatus('✅ Connected to Monad Games ID!', 'success');
                
                walletInfoEl.innerHTML = `
                    <strong>Monad Games ID:</strong><br/>
                    Username: ${username || 'Unknown'}<br/>
                    Wallet: ${wallet.slice(0, 6)}...${wallet.slice(-4)}
                `;
                walletInfoEl.style.display = 'block';
                
                sendToUnity({
                    success: true,
                    provider: 'monad_games_id',
                    token: token,
                    wallet: wallet,
                    username: username
                });
            } else if (code) {
                console.log('[CALLBACK] ✅ Auth code found in URL!');
                updateStatus('Échange du code d\'autorisation...', 'loading');
                
                // Échanger le code contre un access token
                exchangeCodeForToken(code);
            } else if (isFromMonad) {
                console.log('[CALLBACK] ⚠️ Returned from Monad Games ID but no callback parameters found');
                updateStatus('⚠️ No callback data received from Monad Games ID', 'error');
                
                // Essayer de récupérer les données depuis localStorage si Monad Games ID les a stockées
                const storedAuth = localStorage.getItem('monad_games_id_auth');
                if (storedAuth) {
                    try {
                        const authData = JSON.parse(storedAuth);
                        console.log('[CALLBACK] 📦 Found stored auth data:', authData);
                        
                        sendToUnity({
                            success: true,
                            provider: 'monad_games_id',
                            ...authData
                        });
                        
                        localStorage.removeItem('monad_games_id_auth');
                    } catch (e) {
                        console.error('[CALLBACK] ❌ Error parsing stored auth data:', e);
                    }
                }
            } else {
                console.log('[CALLBACK] ℹ️ No callback parameters found, normal page load');
            }
        }
    });
    
    // Fonction pour échanger le code d'autorisation via notre serveur proxy
    async function exchangeCodeForToken(authCode) {
        try {
            console.log('[TOKEN-EXCHANGE]  Exchanging authorization code via proxy server...');
            console.log('[POSTMESSAGE] 📦 Data:', event.data);
            
            // Vérifier que le message vient de Monad Games ID
            if (event.origin.includes('monad-games-id-site.vercel.app')) {
                if (event.data && event.data.type === 'MONAD_AUTH_SUCCESS') {
                    console.log('[POSTMESSAGE] ✅ Monad Games ID authentication success!');
                    
                    const { user, wallet, username } = event.data;
                    
                    updateStatus('✅ Connected to Monad Games ID!', 'success');
                    
                    walletInfoEl.innerHTML = `
                        <strong>Monad Games ID:</strong><br/>
                        Username: ${username || 'Unknown'}<br/>
                        Wallet: ${wallet ? wallet.slice(0, 6) + '...' + wallet.slice(-4) : 'Unknown'}
                    `;
                    walletInfoEl.style.display = 'block';
                    
                    sendToUnity({
                        success: true,
                        provider: 'monad_games_id',
                        wallet: wallet,
                        username: username,
                        user: user
                    });
                }
            }
        });
        
        // Fonction pour échanger le code d'autorisation via notre serveur proxy
        async function exchangeCodeForToken(authCode) {
            try {
                console.log('[TOKEN-EXCHANGE] 🔄 Exchanging authorization code via proxy server...');
                
                // Appel à notre serveur proxy au lieu de l'API Privy directement
                const response = await fetch('https://chogtanks-servers-clean.onrender.com/oauth/exchange', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        code: authCode,
                        redirect_uri: 'https://redgnad.github.io/CHOGTANKS/privy-crossapp.html'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Proxy exchange failed: ${response.status}`);
                }
                
                const result = await response.json();
                console.log('[TOKEN-EXCHANGE] ✅ Data received from proxy:', result);
                
                if (result.success && result.wallet) {
                    updateStatus('✅ Connected to Monad Games ID!', 'success');
                    
                    walletInfoEl.innerHTML = `
                        <strong>Monad Games ID:</strong><br/>
                        Username: ${result.username || 'Unknown'}<br/>
                        Wallet: ${result.wallet.slice(0, 6)}...${result.wallet.slice(-4)}
                    `;
                    walletInfoEl.style.display = 'block';
                    
                    sendToUnity({
                        success: true,
                        provider: 'monad_games_id',
                        wallet: result.wallet,
                        username: result.username,
                        user_id: result.user_id
                    });
                } else {
                    throw new Error('No wallet address found in response');
                }
                
            } catch (error) {
                console.error('[TOKEN-EXCHANGE] ❌ Error:', error);
                updateStatus(`Erreur d'échange de token: ${error.message}`, 'error');
            }
        }
        
        // Fonction pour récupérer les infos utilisateur avec l'access token
        async function getUserInfo(accessToken) {
            try {
                console.log('[USER-INFO] 🔄 Fetching user info with access token...');
                
                const response = await fetch('https://auth.privy.io/api/v1/users/me', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`User info fetch failed: ${response.status}`);
                }
                
                const userData = await response.json();
                console.log('[USER-INFO] ✅ User data received:', userData);
                
                // Extraire wallet address et username
                const walletAddress = userData.linked_accounts?.find(acc => acc.type === 'wallet')?.address;
                const crossAppAccount = userData.linked_accounts?.find(acc => acc.type === 'cross_app' && acc.provider_app_id === 'cmd8euall0037le0my79qpz42');
                const username = crossAppAccount?.username;
                
                if (walletAddress) {
                    updateStatus('✅ Connected to Monad Games ID!', 'success');
                    
                    walletInfoEl.innerHTML = `
                        <strong>Monad Games ID:</strong><br/>
                        Username: ${username || 'Unknown'}<br/>
                        Wallet: ${walletAddress.slice(0, 6)}...${walletAddress.slice(-4)}
                    `;
                    walletInfoEl.style.display = 'block';
                    
                    sendToUnity({
                        success: true,
                        provider: 'monad_games_id',
                        wallet: walletAddress,
                        username: username,
                        accessToken: accessToken
                    });
                } else {
                    throw new Error('No wallet address found in user data');
                }
                
            } catch (error) {
                console.error('[USER-INFO] ❌ Error:', error);
                updateStatus(`Erreur récupération utilisateur: ${error.message}`, 'error');
            }
        }
        
        // DIAGNOSTIC CRITIQUE: Vérifier si cette page se charge JAMAIS
        console.log('[DIAGNOSTIC] 🚨 PRIVY-CROSSAPP.HTML LOADED - If you see this, the page loads');
        console.log('[DIAGNOSTIC] 🚨 Current URL:', window.location.href);
        console.log('[DIAGNOSTIC] 🚨 Referrer:', document.referrer);
        
        // Afficher immédiatement dans l'UI
        document.addEventListener('DOMContentLoaded', function() {
            updateStatus('🚨 DIAGNOSTIC: Page loaded successfully', 'success');
        });
        
        console.log('[CHOGTANKS] ✅ Simple Monad Games ID auth ready');
    </script>
</body>
</html>
