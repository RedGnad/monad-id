<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHOGTANKS - Monad Games ID Login</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .container {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        text-align: center;
        max-width: 400px;
        width: 90%;
      }
      
      .logo {
        font-size: 24px;
        font-weight: bold;
        color: #333;
        margin-bottom: 30px;
      }
      
      .loading {
        color: #666;
        margin: 20px 0;
      }
      
      .error {
        color: #e74c3c;
        background: #fdf2f2;
        padding: 15px;
        border-radius: 10px;
        margin: 20px 0;
        border-left: 4px solid #e74c3c;
      }
      
      .success {
        color: #27ae60;
        background: #f2fdf5;
        padding: 15px;
        border-radius: 10px;
        margin: 20px 0;
        border-left: 4px solid #27ae60;
      }
      
      .wallet-info {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 10px;
        margin: 20px 0;
        font-family: monospace;
        font-size: 12px;
        word-break: break-all;
      }

      .btn {
        background: #5865F2;
        color: white;
        padding: 15px 30px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin: 10px;
        width: 250px;
        font-weight: 600;
      }
      
      .btn:hover {
        background: #4752C4;
      }
      
      .btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🎮 CHOGTANKS</div>
      <p>Monad Games ID Login</p>
      
      <div id="status" class="loading">
        Initialisation de Privy...
      </div>
      
      <div id="auth-section" style="display: none;">
        <button id="login-btn" class="btn" onclick="loginWithMonadGamesID()">
          🎮 Se connecter avec Monad Games ID
        </button>
        
        <button id="logout-btn" class="btn" onclick="logout()" style="display: none; background: #dc3545;">
          🚪 Se déconnecter
        </button>
      </div>
      
      <div id="user-info" style="display: none;"></div>
    </div>

    <!-- Privy SDK -->
    <script src="https://unpkg.com/@privy-io/react-auth@1.75.1/dist/index.js"></script>
    
    <script>
      let privyClient = null;
      let currentUser = null;
      
      // Configuration Privy pour Monad Games ID
      const PRIVY_CONFIG = {
        appId: 'cmek64iqd02lql70b9fl64lm9',
        config: {
          loginMethods: ['discord'],
          appearance: {
            theme: 'light',
            accentColor: '#5865F2',
            logo: 'https://chogtanks.vercel.app/logo.png'
          },
          embeddedWallets: {
            createOnLogin: 'users-without-wallets'
          }
        }
      };
      
      // Initialiser Privy
      async function initPrivy() {
        try {
          updateStatus('loading', '🔄 Initialisation de Privy...');
          
          // Vérifier si Privy est disponible
          if (typeof window.Privy === 'undefined') {
            throw new Error('Privy SDK non chargé');
          }
          
          // Créer le client Privy
          privyClient = window.Privy.createPrivyClient(PRIVY_CONFIG.appId, PRIVY_CONFIG.config);
          
          // Vérifier si l'utilisateur est déjà connecté
          currentUser = privyClient.user;
          
          if (currentUser && currentUser.id) {
            updateStatus('success', '✅ Utilisateur déjà connecté');
            showUserInfo(currentUser);
          } else {
            updateStatus('success', '👋 Prêt à se connecter');
            showAuthSection();
          }
          
        } catch (error) {
          console.error('Erreur initialisation Privy:', error);
          updateStatus('error', `❌ Erreur: ${error.message}`);
          
          // Fallback: montrer quand même les boutons
          showAuthSection();
        }
      }
      
      // Se connecter avec Monad Games ID (Discord)
      async function loginWithMonadGamesID() {
        try {
          updateStatus('loading', '🔄 Connexion Monad Games ID...');
          document.getElementById('login-btn').disabled = true;
          
          if (!privyClient) {
            throw new Error('Privy non initialisé');
          }
          
          // Lancer l'authentification Discord
          await privyClient.login();
          
          // Récupérer les infos utilisateur
          currentUser = privyClient.user;
          
          if (currentUser && currentUser.id) {
            updateStatus('success', '✅ Connexion réussie !');
            showUserInfo(currentUser);
            
            // Notifier Unity
            notifyUnity({
              success: true,
              action: 'login',
              user: {
                id: currentUser.id,
                discord: currentUser.discord,
                wallet: currentUser.wallet
              }
            });
          } else {
            throw new Error('Aucune donnée utilisateur reçue');
          }
          
        } catch (error) {
          console.error('Erreur connexion:', error);
          updateStatus('error', `❌ Erreur connexion: ${error.message}`);
          document.getElementById('login-btn').disabled = false;
          
          // Notifier Unity de l'erreur
          notifyUnity({
            success: false,
            action: 'login',
            error: error.message
          });
        }
      }
      
      // Se déconnecter
      async function logout() {
        try {
          updateStatus('loading', '🔄 Déconnexion...');
          
          if (privyClient) {
            await privyClient.logout();
          }
          
          currentUser = null;
          updateStatus('success', '👋 Déconnecté');
          showAuthSection();
          
          // Notifier Unity
          notifyUnity({
            success: true,
            action: 'logout'
          });
          
        } catch (error) {
          console.error('Erreur déconnexion:', error);
          updateStatus('error', `❌ Erreur déconnexion: ${error.message}`);
        }
      }
      
      // Afficher les informations utilisateur
      function showUserInfo(user) {
        const userInfoDiv = document.getElementById('user-info');
        const authSection = document.getElementById('auth-section');
        
        userInfoDiv.innerHTML = `
          <div class="success">
            <h3>👤 Connecté avec Monad Games ID</h3>
            <p><strong>ID:</strong> ${user.id}</p>
            ${user.discord ? `
              <p><strong>Discord:</strong> ${user.discord.username}</p>
              <p><strong>Email:</strong> ${user.discord.email || 'Non disponible'}</p>
            ` : ''}
            ${user.wallet ? `
              <div class="wallet-info">
                <strong>Wallet:</strong><br>
                ${user.wallet.address}
              </div>
            ` : ''}
          </div>
        `;
        
        userInfoDiv.style.display = 'block';
        document.getElementById('login-btn').style.display = 'none';
        document.getElementById('logout-btn').style.display = 'inline-block';
        authSection.style.display = 'block';
      }
      
      // Afficher la section d'authentification
      function showAuthSection() {
        const authSection = document.getElementById('auth-section');
        const userInfoDiv = document.getElementById('user-info');
        
        authSection.style.display = 'block';
        userInfoDiv.style.display = 'none';
        document.getElementById('login-btn').style.display = 'inline-block';
        document.getElementById('login-btn').disabled = false;
        document.getElementById('logout-btn').style.display = 'none';
      }
      
      // Mettre à jour le statut
      function updateStatus(type, message) {
        const statusDiv = document.getElementById('status');
        statusDiv.className = type;
        statusDiv.innerHTML = message;
      }
      
      // Notifier Unity
      function notifyUnity(data) {
        try {
          if (window.unityInstance) {
            const message = {
              timestamp: new Date().toISOString(),
              source: 'monad-games-id',
              ...data
            };
            
            window.unityInstance.SendMessage(
              'MonadGamesIDWebView', 
              'OnMonadGamesIDResult', 
              JSON.stringify(message)
            );
            
            console.log('Message envoyé à Unity:', message);
          } else {
            console.log('Unity non disponible, données:', data);
          }
        } catch (error) {
          console.error('Erreur communication Unity:', error);
        }
      }
      
      // Initialiser au chargement
      window.onload = function() {
        setTimeout(initPrivy, 1000);
      };
      
      // Gestion des erreurs globales
      window.onerror = function(msg, url, line, col, error) {
        console.error('Erreur globale:', msg, error);
        updateStatus('error', `❌ Erreur: ${msg}`);
        return false;
      };
    </script>
  </body>
</html>
