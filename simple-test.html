<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOGTANKS - Privy Auth</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }
        
        .btn {
            background: #5865F2;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            width: 200px;
        }
        
        .btn:hover {
            background: #4752C4;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        
        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 CHOGTANKS</h1>
        <p>Authentification Monad Games ID</p>
        
        <div id="status" class="status info">
            <div class="loading"></div> Chargement de Privy...
        </div>
        
        <div id="auth-section" style="display: none;">
            <button id="login-btn" class="btn" onclick="loginWithDiscord()">
                🎮 Se connecter avec Discord
            </button>
            
            <button id="logout-btn" class="btn" onclick="logout()" style="display: none; background: #dc3545;">
                � Se déconnecter
            </button>
        </div>
        
        <div id="user-info" style="display: none;"></div>
    </div>

    <script type="module">
        import Privy, { LocalStorage } from 'https://unpkg.com/@privy-io/js-sdk-core@0.53.4/dist/esm/index.js';
        
        let privyClient = null;
        let currentUser = null;
        
        // Configuration Privy
        const PRIVY_CONFIG = {
            appId: 'cmek64iqd02lql70b9fl64lm9',
            clientId: 'client-WY6Ppw4LLAHEMShmi9brMwkW43C9mQfy9r7Z2RyJJojW8'
        };
        
        // Initialiser Privy
        async function initPrivy() {
            try {
                updateStatus('info', '🔄 Initialisation de Privy...');
                
                // Créer le client Privy avec la vraie API selon la doc
                privyClient = new Privy({
                    appId: PRIVY_CONFIG.appId,
                    clientId: PRIVY_CONFIG.clientId,
                    storage: new LocalStorage()
                });
                
                updateStatus('success', '✅ Privy initialisé');
                showAuthSection();
                
            } catch (error) {
                console.error('Erreur initialisation Privy:', error);
                updateStatus('error', `❌ Erreur: ${error.message}`);
                showAuthSection();
            }
        }
        
        // Se connecter avec Discord
        async function loginWithDiscord() {
            try {
                updateStatus('info', '🔄 Connexion Discord en cours...');
                document.getElementById('login-btn').disabled = true;
                
                if (!privyClient) {
                    throw new Error('Privy non initialisé');
                }
                
                // Pour l'instant, simuler une connexion réussie
                // TODO: Implémenter la vraie authentification Discord
                const mockUser = {
                    id: 'mock-user-' + Date.now(),
                    discord: {
                        username: 'TestUser'
                    },
                    email: {
                        address: 'test@example.com'
                    },
                    wallet: {
                        address: '0x1234567890123456789012345678901234567890'
                    }
                };
                
                currentUser = mockUser;
                updateStatus('success', '✅ Connexion réussie !');
                showUserInfo(mockUser);
                
                // Notifier Unity
                notifyUnity({
                    success: true,
                    action: 'login',
                    walletAddress: mockUser.wallet?.address || '',
                    username: mockUser.discord?.username || mockUser.email?.address || '',
                    userId: mockUser.id,
                    email: mockUser.email?.address || '',
                    discordUsername: mockUser.discord?.username || ''
                });
                
            } catch (error) {
                console.error('Erreur connexion:', error);
                updateStatus('error', `❌ Erreur connexion: ${error.message}`);
                document.getElementById('login-btn').disabled = false;
                
                // Notifier Unity de l'erreur
                notifyUnity({
                    success: false,
                    action: 'login',
                    error: error.message
                });
            }
        }
        
        // Se déconnecter
        async function logout() {
            try {
                updateStatus('info', '🔄 Déconnexion...');
                
                if (privyClient) {
                    await privyClient.logout();
                }
                
                currentUser = null;
                updateStatus('info', '👋 Déconnecté');
                showAuthSection();
                
                // Notifier Unity
                notifyUnity({
                    success: true,
                    action: 'logout'
                });
                
            } catch (error) {
                console.error('Erreur déconnexion:', error);
                updateStatus('error', `❌ Erreur déconnexion: ${error.message}`);
            }
        }
        
        // Afficher les informations utilisateur
        function showUserInfo(user) {
            const userInfoDiv = document.getElementById('user-info');
            const authSection = document.getElementById('auth-section');
            
            userInfoDiv.innerHTML = `
                <div class="user-info">
                    <h3>👤 Utilisateur connecté</h3>
                    <p><strong>ID:</strong> ${user.id}</p>
                    ${user.discord ? `
                        <p><strong>Discord:</strong> ${user.discord.username}</p>
                        <p><strong>Email:</strong> ${user.discord.email || 'Non disponible'}</p>
                    ` : ''}
                    ${user.email ? `
                        <p><strong>Email:</strong> ${user.email.address}</p>
                    ` : ''}
                    ${user.wallet ? `
                        <p><strong>Wallet:</strong> ${user.wallet.address}</p>
                    ` : ''}
                </div>
            `;
            
            userInfoDiv.style.display = 'block';
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'inline-block';
            authSection.style.display = 'block';
        }
        
        // Afficher la section d'authentification
        function showAuthSection() {
            const authSection = document.getElementById('auth-section');
            const userInfoDiv = document.getElementById('user-info');
            
            authSection.style.display = 'block';
            userInfoDiv.style.display = 'none';
            document.getElementById('login-btn').style.display = 'inline-block';
            document.getElementById('login-btn').disabled = false;
            document.getElementById('logout-btn').style.display = 'none';
        }
        
        // Mettre à jour le statut
        function updateStatus(type, message) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }
        
        // Notifier Unity
        function notifyUnity(data) {
            try {
                if (window.unityInstance) {
                    const message = {
                        timestamp: new Date().toISOString(),
                        source: 'privy-webview',
                        ...data
                    };
                    
                    window.unityInstance.SendMessage(
                        'MonadGamesIDWebView', 
                        'OnMonadGamesIDResult', 
                        JSON.stringify(message)
                    );
                    
                    console.log('Message envoyé à Unity:', message);
                } else {
                    console.log('Unity non disponible, données:', data);
                    // Stocker dans localStorage comme fallback
                    localStorage.setItem('monadAuthResult', JSON.stringify(data));
                }
            } catch (error) {
                console.error('Erreur communication Unity:', error);
            }
        }
        
        // Exposer les fonctions globalement pour les boutons onclick
        window.loginWithDiscord = loginWithDiscord;
        window.logout = logout;
        window.initPrivy = initPrivy;
        
        // Initialiser au chargement
        window.onload = function() {
            setTimeout(initPrivy, 1000);
        };
        
        // Gestion des erreurs globales
        window.onerror = function(msg, url, line, col, error) {
            console.error('Erreur globale:', msg, error);
            updateStatus('error', `❌ Erreur: ${msg}`);
            return false;
        };
    </script>
    
    <script>
    </script>
</body>
</html>
