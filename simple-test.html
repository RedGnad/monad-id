<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Privy Simple</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .btn {
            background: #4CAF50;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        
        .btn:hover {
            background: #45a049;
        }
        
        .status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 5px;
        }
        
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 CHOGTANKS - Test Privy</h1>
        <p>Test simple pour vérifier le WebView</p>
        
        <div id="status" class="status">
            ⏳ Initialisation...
        </div>
        
        <button class="btn" onclick="testConnection()">
            🔗 Test Connection
        </button>
        
        <button class="btn" onclick="testPrivy()">
            🔐 Test Privy (Simple)
        </button>
        
        <div id="result"></div>
    </div>

    <script>
        // Test de base
        function testConnection() {
            const status = document.getElementById('status');
            status.className = 'status success';
            status.innerHTML = '✅ WebView fonctionne correctement!';
            
            // Test communication avec Unity
            if (window.unityInstance) {
                status.innerHTML += '<br>🎮 Unity détecté';
            } else {
                status.innerHTML += '<br>⚠️ Unity non détecté (normal en test direct)';
            }
        }
        
        // Test Privy simple (sans Cross-App)
        function testPrivy() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>🔄 Test Privy en cours...</p>';
            
            // Simuler un test Privy
            setTimeout(() => {
                result.innerHTML = `
                    <div class="status success">
                        <h3>✅ Test Privy Réussi</h3>
                        <p><strong>App ID:</strong> cmek64iqd02lql70b9fl64lm9</p>
                        <p><strong>Client ID:</strong> client-WY6Ppw4LLAHEMShmi9brMwkW43C9mQfy9r7Z2RyJJojW8</p>
                        <p><strong>Statut:</strong> WebView opérationnel</p>
                        <p><strong>Prochaine étape:</strong> Intégrer Privy SDK</p>
                    </div>
                `;
                
                // Notifier Unity si possible
                try {
                    if (window.unityInstance) {
                        const result = {
                            success: true,
                            message: "WebView test réussi",
                            timestamp: new Date().toISOString()
                        };
                        window.unityInstance.SendMessage('MonadGamesIDWebView', 'OnMonadGamesIDResult', JSON.stringify(result));
                    }
                } catch (e) {
                    console.log('Unity non disponible:', e);
                }
            }, 1000);
        }
        
        // Auto-test au chargement
        window.onload = function() {
            setTimeout(() => {
                testConnection();
            }, 500);
        };
    </script>
</body>
</html>
